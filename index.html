<div id="carousel" style="
    position: relative;
    width: 600px;
    height: 350px;
    margin: auto;
    overflow: hidden;
    margin-top: 10px;">

    <!-- IMAGE -->
    <img id="slide" 
         src="images/img1.png" 
         style="width: 100%; height: 100%; object-fit: cover;">

    <!-- LEFT BUTTON -->
    <button onclick="prevSlide()" style="
        position: absolute;
        top: 50%;
        left: 10px;
        transform: translateY(-50%);
        font-size: 50px;
        background: none;
        border: none;
        color: white;
        cursor: pointer;
    ">&#60;</button>

    <!-- RIGHT BUTTON -->
    <button onclick="nextSlide()" style="
        position: absolute;
        top: 50%;
        right: 10px;
        transform: translateY(-50%);
        font-size: 50px;
        background: none;
        border: none;
        color: white;
        cursor: pointer;
    ">&#62;</button>

</div>
